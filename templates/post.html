<div class="sb-post-layout">

  <article class="sb-article">
    <div class="sb-article-header">
      <h1 class="sb-article-title">{{postTitle}}</h1>
      <div class="sb-article-info">
        <img src="{{avatarUrl}}" class="sb-article-avatar" alt="{{owner}}">
        <span class="sb-article-author">{{owner}}</span>
        <span class="sb-article-sep">·</span>
        <span class="sb-article-date">{{postDate}}</span>
      </div>
    </div>

    <div class="markdown-body" id="postBody">
      {{postBody}}
    </div>

    <div class="sb-article-footer">
      <div class="sb-article-actions">
        <button class="sb-action-btn" onclick="sbLike(this)">
          👍 <span id="likeCount">0</span>
        </button>
        <button class="sb-action-btn" onclick="sbShare()">🔗 分享</button>
      </div>
    </div>

    <div class="sb-comments">
      <div class="sb-widget-title">💬 评论</div>
      <div id="gitalk-container"></div>
    </div>
  </article>

  <div class="sb-article-aside">
    <div class="sb-widget" id="tocWidget">
      <div class="sb-widget-title">📑 文章目录</div>
      <div id="sb-toc" class="sb-toc"></div>
    </div>

    <div class="sb-widget">
      <div class="sb-widget-title">ℹ 文章信息</div>
      <div class="sb-info-row">
        <span>发布日期</span>
        <span>{{postDate}}</span>
      </div>
    </div>

    <div class="sb-widget">
      <div class="sb-widget-title">📊 阅读进度</div>
      <div class="sb-read-progress-wrap">
        <div class="sb-read-progress-bar">
          <div class="sb-read-progress-fill" id="readProgressFill"></div>
        </div>
        <span class="sb-read-progress-num" id="readProgressNum">0%</span>
      </div>
    </div>
  </div>

</div>
